<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Modern Tic Tac Toe</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
          
    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<main class="ttt-wrap">

    <!-- ========================= -->
    <!-- TITLE -->
    <!-- ========================= -->

    <h1 class="ttt-title">

        <i class="fa-solid fa-gamepad"></i>

        Tic <span>Tac</span> Toe

    </h1>

    <!-- ========================= -->
    <!-- GAME MODE -->
    <!-- ========================= -->

    <div class="mode-row">

        <button
            class="mode-btn active"
            id="btn2p"
            onclick="setMode('2p')">

            <i class="fa-solid fa-user-group"></i>

            2 Players

        </button>

        <button
            class="mode-btn"
            id="btnCpu"
            onclick="setMode('cpu')">

            <i class="fa-solid fa-robot"></i>

            VS CPU

        </button>

    </div>

    <!-- ========================= -->
    <!-- DIFFICULTY -->
    <!-- ========================= -->

    <div
        class="difficulty-row"
        id="diffRow">

        <span class="diff-lbl">

            Difficulty

        </span>

        <button
            class="diff-btn active-easy"
            id="dEasy"
            onclick="setDiff('easy',this)">

            🟢 Easy

        </button>

        <button
            class="diff-btn"
            id="dMed"
            onclick="setDiff('medium',this)">

            🟡 Medium

        </button>

        <button
            class="diff-btn"
            id="dHard"
            onclick="setDiff('hard',this)">

            🔴 Hard

        </button>

    </div>

    <!-- ========================= -->
    <!-- SCOREBOARD -->
    <!-- ========================= -->

    <div class="score-bar">

        <!-- PLAYER X -->

        <div
            class="score-box active-turn"
            id="scoreBoxX">

            <div class="score-symbol score-sym-x">

                <i class="fa-solid fa-xmark"></i>

            </div>

            <div
                class="score-num"
                id="sX">

                0

            </div>

            <div
                class="score-lbl"
                id="lblX">

                PLAYER 1

            </div>

        </div>

        <div class="score-sep">

            VS

        </div>

        <!-- DRAW -->

        <div
            class="score-box"
            id="scoreBoxDraw">

            <div class="score-symbol score-sym-draw">

                <i class="fa-solid fa-handshake"></i>

            </div>

            <div
                class="score-num"
                id="sDraw">

                0

            </div>

            <div class="score-lbl">

                DRAWS

            </div>

        </div>

        <div class="score-sep">

            VS

        </div>

        <!-- PLAYER O -->

        <div
            class="score-box"
            id="scoreBoxO">

            <div class="score-symbol score-sym-o">

                <i class="fa-regular fa-circle"></i>

            </div>

            <div
                class="score-num"
                id="sO">

                0

            </div>

            <div
                class="score-lbl"
                id="lblO">

                PLAYER 2

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- STATUS -->
    <!-- ========================= -->

    <div class="status-row">

        <div
            class="status-txt"
            id="status">

            <i class="fa-solid fa-play"></i>

            X's Turn

        </div>

    </div>

         <!-- ========================= -->
    <!-- GAME BOARD -->
    <!-- ========================= -->

    <div
        class="board"
        id="board">

    </div>

    <!-- ========================= -->
    <!-- GAME HINT -->
    <!-- ========================= -->

    <div
        class="hint-row"
        id="hintRow">

        Select a game mode to begin.

    </div>

    <!-- ========================= -->
    <!-- CONTROL BUTTONS -->
    <!-- ========================= -->

    <div class="btn-row">

        <button
            class="ctrl-btn"
            onclick="newRound()">

            <i class="fa-solid fa-rotate-right"></i>

            New Round

        </button>

        <button
            class="ctrl-btn reset-all"
            onclick="resetAll()">

            <i class="fa-solid fa-trash"></i>

            Reset Scores

        </button>

    </div>

    <!-- ========================= -->
    <!-- MATCH HISTORY -->
    <!-- ========================= -->

    <div
        class="history-bar"
        id="histBar"
        title="Purple = X   Pink = O   Gray = Draw">

    </div>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <div class="footer">

        <i class="fa-solid fa-heart"
           style="color:#ff5e94;"></i>

        Made with HTML, CSS & JavaScript

    </div>

</main>

<!-- ========================= -->
<!-- JAVASCRIPT FILES -->
<!-- ========================= -->

<script src="js/game.js"></script>

<script src="js/ai.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>

</html>
